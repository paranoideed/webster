get:
  tags:
    - templates
  summary: Get a template
  description: Returns a single template. Public templates are accessible to all authenticated users; private templates only to their owner.
  security:
    - cookieAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '200':
      description: Template found.
      content:
        application/json:
          schema:
            $ref: '../schemas/Template.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Not the owner of a private template.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Template not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

patch:
  tags:
    - templates
  summary: Update template name
  description: Renames a private template. Only the owner can rename it.
  security:
    - cookieAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/UpdateTemplate.yaml'
  responses:
    '200':
      description: Template updated.
      content:
        application/json:
          schema:
            $ref: '../schemas/Template.yaml'
    '400':
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Not the owner or template is public.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Template not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

delete:
  tags:
    - templates
  summary: Delete a private template
  description: >
    Permanently soft-deletes a private template.
    Only the owner can delete their template; public templates cannot be deleted.
  security:
    - cookieAuth: []
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    '204':
      description: Template deleted.
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Not the owner or template is public.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Template not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
