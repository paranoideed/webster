get:
  tags:
    - templates
  summary: List templates
  description: >
    Returns a paginated list of all public (system) templates plus the
    authenticated user's private templates.
  security:
    - cookieAuth: []
  parameters:
    - name: page[limit]
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    - name: page[offset]
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    - name: sort
      in: query
      schema:
        type: string
        enum: [ newest, oldest ]
        default: newest
  responses:
    '200':
      description: List of templates.
      content:
        application/json:
          schema:
            $ref: '../schemas/TemplatesCollection.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

post:
  tags:
    - templates
  summary: Create a private template
  description: Creates a new private template owned by the authenticated user.
  security:
    - cookieAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/CreateTemplate.yaml'
  responses:
    '201':
      description: Template created.
      content:
        application/json:
          schema:
            $ref: '../schemas/Template.yaml'
    '400':
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
