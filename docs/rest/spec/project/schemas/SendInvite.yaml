type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - type
      - attributes
    properties:
      type:
        type: string
        enum: [ project_invite ]
      attributes:
        type: object
        required:
          - email
        properties:
          email:
            type: string
            format: email
            example: "colleague@example.com"
