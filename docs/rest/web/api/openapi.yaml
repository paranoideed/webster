          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          type: account_email
        - attributes:
            updated_at: 2000-01-23T04:56:07.000+00:00
            verified: true
            created_at: 2000-01-23T04:56:07.000+00:00
            version: 6
            email: email
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          type: account_email
      properties:
        data:
          $ref: "#/schemas/Account_data"
        included:
          items:
            $ref: "#/schemas/AccountEmail"
          type: array
      required:
      - data
    AccountEmail:
      example:
        attributes:
          updated_at: 2000-01-23T04:56:07.000+00:00
          verified: true
          created_at: 2000-01-23T04:56:07.000+00:00
          version: 6
          email: email
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        type: account_email
      properties:
        id:
          description: account ID
          format: uuid
          type: string
        type:
          enum:
          - account_email
          type: string
        attributes:
          $ref: "#/schemas/AccountEmail_attributes"
      required:
      - attributes
      - id
      - type
    Errors:
      description: Standard JSON:API error
      example:
        errors:
        - detail: Request body was expected
          title: Bad Request
          status: 400
        - detail: Request body was expected
          title: Bad Request
          status: 400
      properties:
        errors:
          description: Non empty array of errors occurred during request processing
          items:
            $ref: "#/schemas/Errors_errors_inner"
          type: array
      required:
      - errors
    PaginationData:
      example:
        next: https://openapi-generator.tech
        last: https://openapi-generator.tech
        prev: https://openapi-generator.tech
        self: https://openapi-generator.tech
        first: https://openapi-generator.tech
      properties:
        self:
          description: link to the current page
          format: uri
          type: string
        first:
          description: link to the first page
          format: uri
          type: string
        last:
          description: link to the last page
          format: uri
          type: string
        prev:
          description: link to the previous page
          format: uri
          type: string
        next:
          description: link to the next page
          format: uri
          type: string
      required:
      - self
    LoginByEmail_data_attributes:
      example:
        password: StrongP@ssw0rd!
        email: example@gmail.com
      properties:
        email:
          description: The account's email address.
          example: example@gmail.com
          format: email
          type: string
        password:
          description: The account's password.
          example: StrongP@ssw0rd!
          format: password
          type: string
      required:
      - email
      - password
    LoginByEmail_data:
      example:
        attributes:
          password: StrongP@ssw0rd!
          email: example@gmail.com
        type: account_session
      properties:
        type:
          enum:
          - account_session
          type: string
        attributes:
          $ref: "#/schemas/LoginByEmail_data_attributes"
      required:
      - attributes
      - type
    LoginByUsername_data_attributes:
      example:
        password: StrongP@ssw0rd!
        username: example
      properties:
        username:
          description: The account's username.
          example: example
          type: string
        password:
          description: The account's password.
          example: StrongP@ssw0rd!
          format: password
          type: string
      required:
      - password
      - username
    LoginByUsername_data:
      example:
        attributes:
          password: StrongP@ssw0rd!
          username: example
        type: account_session
      properties:
        type:
          enum:
          - account_session
          type: string
        attributes:
          $ref: "#/schemas/LoginByUsername_data_attributes"
