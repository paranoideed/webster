openapi: 3.1.1
info:
  description: API documentation for user-svc
  title: netbill user-svc API
  version: 0.1.0
servers:
- url: http://localhost:8001
paths:
  /auth-svc/v1/registration/:
    post:
      description: Endpoint to register a new user account.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/schemas/Registration"
        required: true
      responses:
        "201":
          description: Account successfully registered
        "409":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Conflict: An account with this email or phone number already exists. Check the 'detail' field in the response for more information.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal server error
      summary: Register a new account
      tags:
      - registration
  /auth-svc/v1/registration/admin:
    post:
      description: |
        Registers a new account by an authenticated admin.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/schemas/RegistrationAdmin"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Account"
          description: Account successfully registered by admin
        "400":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Bad Request. Request body is invalid or some attributes do not meet requirements. Check the `errors` array for details.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Account cannot be resolved from context or initiator account not found. Check the `detail` field in the response for more information.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Forbidden. Initiator account is not active or does not have enough rights. Check the `detail` field in the response for more information.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Conflict. Email is already taken. Check the `detail` field in the response for more information.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Register a new admin account
      tags:
      - registration
  /auth-svc/v1/login/email:
    post:
      description: |
        Endpoint to login a user using their email and password.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/schemas/LoginByEmail"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/TokensPair"
          description: Successful login
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized: Invalid email or password.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal server error
      summary: Login by email
      tags:
      - login
  /auth-svc/v1/login/username:
    post:
      description: Endpoint to login a user using their username and password.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/schemas/LoginByUsername"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/TokensPair"
          description: Successful login
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized: Invalid username or password. Check the 'detail' field in the response for more information.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal server error
      summary: Login by username
      tags:
      - login
  /auth-svc/v1/login/google:
    post:
      description: |
        Redirects the user-agent to Google OAuth consent screen. This endpoint returns a redirect and does not return a JSON:API document.
      responses:
        "307":
          description: Temporary Redirect to Google OAuth consent screen
          headers:
            Location:
              description: Google OAuth authorization URL
              explode: false
              schema:
                format: uri
                type: string
              style: simple
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      summary: Start Google OAuth login
      tags:
      - login
  /auth-svc/v1/login/google/callback:
    get:
      description: |
        Exchanges Google OAuth `code` for user info and returns an access/refresh tokens pair.
      parameters:
      - description: OAuth authorization code returned by Google
        explode: true
        in: query
        name: code
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/TokensPair"
          description: Tokens pair issued
        "400":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Missing or invalid query parameter `code`
        "404":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Account not found for this email
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      summary: Google OAuth callback
      tags:
      - login
  /auth-svc/v1/refresh:
    post:
      description: |
        Issues a new access/refresh tokens pair using a valid refresh token.
        **401 Unauthorized** is returned when the account or session does not exist. **403 Forbidden** is returned when the account is inactive or the refresh token does not match the session.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/schemas/RefreshSession"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/TokensPair"
          description: Tokens pair successfully refreshed
        "400":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Bad Request. Request body is invalid. Check the `errors` array for details.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Account not found or session not found or invalid refresh token.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      summary: Refresh session
      tags:
      - sessions
  /auth-svc/v1/me:
    delete:
      description: |
        Deletes the authenticated account.
      responses:
        "204":
          description: Account successfully deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Invalid credentials, initiator account not found, or session is invalid. Check the `detail` field in the response for more information.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Account is have membership in an organization,  must leave all organizations before deleting the account.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete my account
      tags:
      - accounts
    get:
      description: |
        Returns the authenticated account.
      parameters:
      - description: |
          Optional related resources to include. Supported values: `email`.
        explode: false
        in: query
        name: include
        required: false
        schema:
          items:
            enum:
            - email
            type: string
          type: array
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Account"
          description: Account successfully retrieved
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Invalid credentials or account cannot be resolved from context. Check the `detail` field in the response for more information.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get my account
      tags:
      - accounts
  /auth-svc/v1/me/logout:
    post:
      description: |
        Invalidates the current session of the authenticated account.
      responses:
        "204":
          description: Successfully logged out
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Account cannot be resolved from context. Check the `detail` field in the response for more information.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Logout
      tags:
      - sessions
  /auth-svc/v1/me/password:
    patch:
      description: |
        Updates the password of the authenticated account.
        **401 Unauthorized** is returned when credentials are invalid, the session is invalid, or the old password is incorrect. **403 Forbidden** is returned when the initiator is blocked or password change is temporarily restricted.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/schemas/UpdatePassword"
        required: true
      responses:
        "204":
          description: Password successfully updated
        "400":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Bad Request. Request body is invalid or the new password does not meet requirements. Check the `errors` array for details.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Invalid credentials, invalid session, user not found, or invalid password.
        "403":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Forbidden. Cannot change password yet due, password change timeout.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Update password
      tags:
      - accounts
  /auth-svc/v1/me/username:
    patch:
      description: |
        Updates the username of the authenticated account.
        **401 Unauthorized** is returned when credentials are invalid, the session is invalid, or the password is incorrect. **403 Forbidden** is returned when the initiator is blocked or username change is temporarily restricted. **409 Conflict** is returned when the requested username is already taken.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/schemas/UpdateUsername"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Account"
          description: Username successfully updated
        "400":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Bad Request. Request body is invalid or the new username does not meet requirements. Check the `errors` array for details.
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Invalid credentials, invalid session, user not found, or invalid password.
        "409":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Conflict. The requested username is already taken. Check the `detail` field in the response for more information.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Update username
      tags:
      - accounts
  /auth-svc/v1/me/sessions:
    delete:
      description: |
        Deletes all sessions of the authenticated account (logout from all devices).
      responses:
        "204":
          description: Sessions successfully deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Invalid credentials, initiator account not found, or session is invalid.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete my sessions
      tags:
      - sessions
    get:
      description: |
        Returns sessions of the authenticated account.
        Supports pagination via query parameters.
      parameters:
      - description: Max number of items to return
        explode: true
        in: query
        name: "page[limit]"
        required: false
        schema:
          minimum: 1
          type: integer
        style: form
      - description: Number of items to skip
        explode: true
        in: query
        name: "page[offset]"
        required: false
        schema:
          minimum: 0
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/AccountSessionsCollection"
          description: Sessions successfully retrieved
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: |
            Unauthorized. Invalid credentials, initiator account not found, or session is invalid.
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get my sessions
      tags:
      - sessions
  /auth-svc/v1/me/sessions/{session_id}:
    delete:
      description: |
        Delete session by ID
      parameters:
      - description: Session ID
        explode: false
        in: path
        name: session_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "204":
          description: Session successfully deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: "Unauthorized, session not exist or session does not belong\
            \ to the authenticated account"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Delete my sessions
      tags:
      - sessions
    get:
      description: |
        Returns sessions of the authenticated account.
      parameters:
      - description: Session ID
        explode: false
        in: path
        name: session_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/schemas/AccountSessionsCollection"
          description: Sessions successfully retrieved
        "401":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Unauthorized
        "500":
          content:
            application/json:
              schema:
                $ref: "#/schemas/Errors"
          description: Internal Server Error
      security:
      - BearerAuth: []
      summary: Get my sessions
      tags:
      - sessions
    parameters:
    - description: Session ID
      explode: false
      in: path
      name: session_id
      required: true
      schema:
        format: uuid
        type: string
      style: simple
components:
  schemas:
    LoginByEmail:
      example:
        data:
          attributes:
            password: StrongP@ssw0rd!
            email: example@gmail.com
          type: account_session
      properties:
        data:
          $ref: "#/schemas/LoginByEmail_data"
      required:
      - data
    LoginByUsername:
      example:
        data:
          attributes:
            password: StrongP@ssw0rd!
            username: example
          type: account_session
      properties:
        data:
          $ref: "#/schemas/LoginByUsername_data"
      required:
      - data
    Registration:
      example:
        data:
          attributes:
            password: StrongP@ssw0rd!
            email: example@gmail.com
            username: user123
          type: account
      properties:
        data:
          $ref: "#/schemas/Registration_data"
      required:
      - data
    RegistrationAdmin:
      example:
        data:
          attributes:
            password: StrongP@ssw0rd!
            role: admin
            email: example1312@gmail.com
            username: adminUser
          type: account
      properties:
        data:
          $ref: "#/schemas/RegistrationAdmin_data"
      required:
      - data
    RefreshSession:
      example:
        data:
          attributes:
            refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          type: account_session
      properties:
        data:
          $ref: "#/schemas/RefreshSession_data"
      required:
      - data
    UpdatePassword:
      example:
        data:
          attributes:
            old_password: OldP@ssw0rd!
            new_password: StrongP@ssw0rd!
          type: account_password
      properties:
        data:
          $ref: "#/schemas/UpdatePassword_data"
      required:
      - data
    UpdateUsername:
      example:
        data:
          attributes:
            username: username
          type: account_username
      properties:
        data:
          $ref: "#/schemas/UpdateUsername_data"
      required:
      - data
    TokensPair:
      example:
        data:
          attributes:
            access_token: access_token
            refresh_token: refresh_token
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          type: tokens_pair
      properties:
        data:
          $ref: "#/schemas/TokensPair_data"
      required:
      - data
    AccessToken:
      properties:
        data:
          $ref: "#/schemas/AccessToken_data"
      required:
      - data
    AccountSession:
      properties:
        data:
          $ref: "#/schemas/AccountSessionData"
      required:
      - data
    AccountSessionData:
      example:
        attributes:
          account_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          last_used: 2000-01-23T04:56:07.000+00:00
          created_at: 2000-01-23T04:56:07.000+00:00
          version: 0
        id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        type: account_session
      properties:
        id:
          description: session id
          format: uuid
          type: string
        type:
          enum:
          - account_session
          type: string
        attributes:
          $ref: "#/schemas/AccountSessionAttributes"
      required:
      - attributes
      - id
      - type
    AccountSessionAttributes:
      example:
        account_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        last_used: 2000-01-23T04:56:07.000+00:00
        created_at: 2000-01-23T04:56:07.000+00:00
        version: 0
      properties:
        account_id:
          description: account id
          format: uuid
          type: string
        created_at:
          description: session creation date
          format: date-time
          type: string
        version:
          description: The version number of the account record
          type: integer
        last_used:
          description: last used date
          format: date-time
          type: string
      required:
      - account_id
      - created_at
      - last_used
      - version
    AccountSessionsCollection:
      example:
        data:
        - attributes:
            account_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
            last_used: 2000-01-23T04:56:07.000+00:00
            created_at: 2000-01-23T04:56:07.000+00:00
            version: 0
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          type: account_session
        - attributes:
            account_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
            last_used: 2000-01-23T04:56:07.000+00:00
            created_at: 2000-01-23T04:56:07.000+00:00
            version: 0
          id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
          type: account_session
        links:
          next: https://openapi-generator.tech
