                          - type: object
                            required:
                              - op
                              - layer
                            properties:
                              op:
                                type: string
                                enum:
                                  - add_layer
                              layer:
                                type: object
                                required:
                                  - className
                                  - attrs
                                  - children
                                properties:
                                  className:
