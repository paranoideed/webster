      commitAck:
        name: commit:ack
        summary: Confirmed commit broadcast to all room members
        payload:
          schemaFormat: application/vnd.aai.asyncapi+yaml;version=3.0.0
          schema:
            type: object
            required:
              - number
              - previous
              - changes
            properties:
              number:
                type: integer
                example: 6
              previous:
                type: integer
                example: 5
              changes:
                type: array
                items:
                  oneOf:
                    - type: object
                      required:
                        - op
                        - parentId
                        - node
                      properties:
                        op:
                          type: string
                          enum:
                            - add
                        parentId:
                          type: string
                          description: ID of the parent layer or group
                        node:
                          type: object
                          required:
                            - className
                            - attrs
                          properties:
                            className:
                              type: string
                              example: Rect
                            attrs:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  type: string
                              additionalProperties: true
                            children:
                              type: array
                              items:
                                type: object
                    - type: object
                      required:
                        - op
                        - id
                        - props
                      properties:
                        op:
                          type: string
                          enum:
                            - update
                        id:
                          type: string
                        props:
                          type: object
                          additionalProperties: true
                    - type: object
                      required:
                        - op
                        - id
                      properties:
                        op:
                          type: string
                          enum:
                            - delete
                        id:
                          type: string
                    - type: object
                      required:
                        - op
                        - id
                        - newIndex
                      properties:
                        op:
                          type: string
                          enum:
                            - reorder
                        id:
                          type: string
                        newIndex:
                          type: integer
                    - type: object
                      required:
                        - op
                        - id
                        - layerId
                      properties:
                        op:
                          type: string
                          enum:
                            - move_to_layer
                        id:
                          type: string
                        layerId:
                          type: string
                    - type: object
                      required:
                        - op
                        - layer
                      properties:
                        op:
                          type: string
                          enum:
                            - add_layer
                        layer:
                          type: object
                          required:
                            - className
                            - attrs
                            - children
                          properties:
                            className:
                              type: string
                              enum:
                                - Layer
                            attrs:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  type: string
                              additionalProperties: true
                            children:
                              type: array
                              items:
                                type: object
                                required:
                                  - className
                                  - attrs
                                properties:
                                  className:
                                    type: string
                                    example: Rect
                                  attrs:
                                    type: object
                                    required:
                                      - id
                                    properties:
                                      id:
                                        type: string
                                    additionalProperties: true
                                  children:
                                    type: array
                                    items:
                                      type: object
                    - type: object
                      required:
                        - op
                        - id
                        - props
                      properties:
                        op:
                          type: string
                          enum:
                            - update_layer
                        id:
                          type: string
                        props:
                          type: object
                          additionalProperties: true
                    - type: object
                      required:
                        - op
                        - id
                      properties:
                        op:
                          type: string
                          enum:
                            - delete_layer
                        id:
                          type: string
                    - type: object
                      required:
                        - op
                        - id
                        - newIndex
                      properties:
                        op:
                          type: string
                          enum:
                            - reorder_layer
                        id:
                          type: string
                        newIndex:
                          type: integer
                    - type: object
                      required:
                        - op
                        - props
                      properties:
                        op:
                          type: string
                          enum:
                            - update_stage
                        props:
                          type: object
                          additionalProperties: true
                  discriminator: op
              createdAt:
                type: string
                format: date-time
        examples:
          - name: commit:ack example
            payload:
              number: 6
              previous: 5
              changes:
                - op: add
                  parentId: layer-1
                  node:
                    className: Rect
                    attrs:
                      id: rect-2
                      x: 300
                      'y': 200
                      width: 120
                      height: 80
                      fill: '#E74C3C'
              createdAt: '2026-04-17T10:01:00.000Z'
  commit:error:
    address: commit:error
    description: |
      Server sends this only to the sender when a commit is rejected
      (e.g. `previous` is stale — concurrent edit conflict).
      Client should re-fetch state via `join` and retry.
    messages:
      commitError:
        name: commit:error
        summary: Commit rejection sent only to the sender
        payload:
          schemaFormat: application/vnd.aai.asyncapi+yaml;version=3.0.0
          schema:
            type: object
            required:
              - code
              - message
            properties:
              code:
                type: string
                enum:
                  - STALE_PREVIOUS
                  - UNAUTHORIZED
                  - NOT_FOUND
                example: STALE_PREVIOUS
              message:
                type: string
                example: 'Commit rejected: previous=3 but current HEAD=5'
        examples:
          - name: stale previous
            payload:
              code: STALE_PREVIOUS
              message: 'Commit rejected: previous=3 but current HEAD=5'
  snapshot:
    address: snapshot
    description: >
      Server broadcasts a new snapshot to all clients in the room.

      Triggered automatically when commit `number` reaches a snapshot boundary
      (`n`, `2n`, `3n`, …).
    messages:
      snapshotPush:
        name: snapshot
        summary: New snapshot broadcast when a boundary commit is reached
        payload:
          schemaFormat: application/vnd.aai.asyncapi+yaml;version=3.0.0
          schema:
            type: object
            required:
              - snapshot
              - commits
            properties:
              snapshot:
                type: object
                required:
                  - version
                  - body
                  - createdAt
                properties:
                  version:
                    type: integer
                    description: Snapshot version index (0, 1, 2, …)
                    example: 2
                  body:
                    type: object
                    required:
                      - className
                      - attrs
                      - children
                    properties:
                      className:
                        type: string
                        enum:
                          - Stage
                      attrs:
                        type: object
                        additionalProperties: true
                      children:
                        type: array
                        items:
                          type: object
                          required:
                            - className
                            - attrs
                            - children
                          properties:
                            className:
                              type: string
                              enum:
                                - Layer
                            attrs:
                              type: object
                              required:
                                - id
                              properties:
                                id:
                                  type: string
                              additionalProperties: true
                            children:
                              type: array
                              items:
                                type: object
                                required:
                                  - className
                                  - attrs
                                properties:
                                  className:
                                    type: string
                                    example: Rect
                                  attrs:
                                    type: object
                                    required:
                                      - id
                                    properties:
                                      id:
                                        type: string
                                    additionalProperties: true
                                  children:
                                    type: array
                                    items:
                                      type: object
                  createdAt:
                    type: string
                    format: date-time
              commits:
                type: array
                description: Commits after the snapshot (up to n commits)
                items:
                  type: object
                  required:
                    - number
                    - previous
                    - changes
                  properties:
                    number:
                      type: integer
                      example: 6
                    previous:
                      type: integer
                      example: 5
                    changes:
                      type: array
                      items:
                        oneOf:
                          - type: object
                            required:
                              - op
                              - parentId
                              - node
                            properties:
                              op:
                                type: string
                                enum:
                                  - add
                              parentId:
                                type: string
                                description: ID of the parent layer or group
                              node:
                                type: object
                                required:
                                  - className
                                  - attrs
                                properties:
                                  className:
                                    type: string
                                    example: Rect
                                  attrs:
                                    type: object
                                    required:
                                      - id
                                    properties:
                                      id:
                                        type: string
                                    additionalProperties: true
                                  children:
                                    type: array
                                    items:
                                      type: object
                          - type: object
                            required:
                              - op
                              - id
                              - props
                            properties:
                              op:
                                type: string
                                enum:
                                  - update
                              id:
                                type: string
                              props:
                                type: object
                                additionalProperties: true
                          - type: object
                            required:
                              - op
                              - id
                            properties:
                              op:
                                type: string
                                enum:
                                  - delete
                              id:
