                                      required:
                                        - className
                                        - attrs
                                      properties:
                                        className:
                                          type: string
                                          example: Rect
                                        attrs:
                                          type: object
                                          required:
                                            - id
                                          properties:
                                            id:
                                              type: string
                                          additionalProperties: true
                                        children:
                                          type: array
                                          items:
                                            type: object
                          - type: object
                            required:
                              - op
                              - id
                              - props
                            properties:
                              op:
                                type: string
                                enum:
                                  - update_layer
                              id:
                                type: string
                              props:
                                type: object
                                additionalProperties: true
                          - type: object
                            required:
                              - op
                              - id
                            properties:
                              op:
                                type: string
                                enum:
                                  - delete_layer
                              id:
                                type: string
                          - type: object
                            required:
                              - op
                              - id
                              - newIndex
                            properties:
                              op:
                                type: string
                                enum:
                                  - reorder_layer
                              id:
                                type: string
                              newIndex:
                                type: integer
                          - type: object
                            required:
                              - op
                              - props
                            properties:
                              op:
                                type: string
                                enum:
                                  - update_stage
                              props:
                                type: object
                                additionalProperties: true
                        discriminator: op
                    createdAt:
                      type: string
