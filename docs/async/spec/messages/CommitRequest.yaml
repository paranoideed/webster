name: commit
summary: New commit from client
payload:
  schemaFormat: 'application/vnd.aai.asyncapi+yaml;version=3.0.0'
  schema:
    $ref: '../schemas/CommitRequestPayload.yaml'
examples:
  - name: add node
    payload:
      previous: 5
      changes:
        - op: add
          parentId: "layer-1"
          node:
            className: Rect
            attrs: { id: "rect-2", x: 300, y: 200, width: 120, height: 80, fill: "#E74C3C" }
  - name: update node
    payload:
      previous: 6
      changes:
        - op: update
          id: "rect-2"
          props: { fill: "#2ECC71", width: 150 }
  - name: delete node
    payload:
      previous: 7
      changes:
        - op: delete
          id: "rect-2"
