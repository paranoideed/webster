name: commit:error
summary: Commit rejection sent only to the sender
payload:
  schemaFormat: 'application/vnd.aai.asyncapi+yaml;version=3.0.0'
  schema:
    $ref: '../schemas/CommitError.yaml'
examples:
  - name: access denied
    payload:
      message: "Access denied"
  - name: invalid changes
    payload:
      message: "Invalid changes"
      errors:
        - "[0] parentId must be a non-empty string"
  - name: commit failed
    payload:
      message: "Commit failed, please retry"
