name: redo:error
summary: Redo rejection sent only to the sender
payload:
  schemaFormat: 'application/vnd.aai.asyncapi+yaml;version=3.0.0'
  schema:
    type: object
    required: [message]
    properties:
      message:
        type: string
        description: Human-readable error description
examples:
  - name: head exceeds latest commit
    payload:
      message: "head 15 exceeds latest commit 10"
  - name: not joined
    payload:
      message: "Not joined to any canvas"
