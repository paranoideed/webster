get:
  tags:
    - projects
  summary: Get a project
  description: >
    Returns a single project by ID.
    The authenticated user must be a member of the project.
    Requires a valid access token.
  security:
    - cookieAuth: []

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "project ID"

  responses:
    '200':
      description: Project found.
      content:
        application/json:
          schema:
            $ref: '../schemas/Project.yaml'
    '401':
      description: Unauthorized. Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. You are not a member of this project.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Project not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

patch:
  tags:
    - projects
  summary: Update a project
  description: >
    Updates the project name.
    Requires the authenticated user to be an **owner** or **editor** of the project.
    Requires a valid access token.
  security:
    - cookieAuth: []

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "project ID"

  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../schemas/UpdateProject.yaml'

  responses:
    '200':
      description: Project updated.
      content:
        application/json:
          schema:
            $ref: '../schemas/Project.yaml'
    '400':
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized. Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. You are not a member, or your role is viewer.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Project not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

delete:
  tags:
    - projects
  summary: Delete a project
  description: >
    Permanently deletes a project and all its members and invites (cascade).
    Only the project **owner** can perform this action.
    Requires a valid access token.
  security:
    - cookieAuth: []

  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: "project ID"

  responses:
    '204':
      description: Project deleted.
    '401':
      description: Unauthorized. Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '403':
      description: Forbidden. You are not the owner.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '404':
      description: Project not found.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
