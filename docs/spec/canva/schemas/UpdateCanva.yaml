type: object
required:
  - data
properties:
  data:
    type: object
    required:
      - id
      - type
      - attributes
    properties:
      id:
        type: string
        format: uuid
      type:
        type: string
        enum: [ canva ]
      attributes:
        type: object
        required:
          - name
        properties:
          name:
            type: string
            minLength: 1
            maxLength: 255
            example: "Updated name"
