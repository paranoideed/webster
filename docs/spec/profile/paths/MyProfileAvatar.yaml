post:
  tags:
    - profiles
  summary: Upload my avatar
  description: >
    Uploads or replaces the current authenticated user's avatar image.
    Requires a valid access token.
  security:
    - cookieAuth: []

  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
            - avatar
          properties:
            avatar:
              type: string
              format: binary
              description: "Avatar image file"

  responses:
    '200':
      description: Avatar uploaded. Returns the updated profile.
      content:
        application/json:
          schema:
            $ref: '../schemas/Profile.yaml'
    '400':
      description: Bad request (invalid file format or size).
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '401':
      description: Unauthorized. Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

delete:
  tags:
    - profiles
  summary: Delete my avatar
  description: >
    Deletes the current authenticated user's avatar image.
    Requires a valid access token.
  security:
    - cookieAuth: []

  responses:
    '204':
      description: Avatar deleted.
    '401':
      description: Unauthorized. Missing or invalid access token.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
