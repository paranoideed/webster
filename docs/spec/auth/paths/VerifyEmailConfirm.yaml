post:
  tags:
    - auth
  summary: Confirm email verification
  description: >
    Confirms the user's email address using the 6-digit code sent to their inbox.
    The code expires after 5 minutes.
  security:
    - cookieAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - data
          properties:
            data:
              type: object
              required:
                - type
                - attributes
              properties:
                type:
                  type: string
                  enum:
                    - account
                attributes:
                  type: object
                  required:
                    - code
                  properties:
                    code:
                      type: string
                      description: 6-digit verification code received by email.
                      example: "483920"
  responses:
    '204':
      description: Email successfully verified.

    '400':
      description: Invalid or expired code, or email already verified.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

    '401':
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'

    '500':
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '../../shared/Errors.yaml'
