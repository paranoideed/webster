services:
  backend:
    container_name: webster-backend
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT}:3000"
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      PORT: 3000
      CASSANDRA_CONTACT_POINTS: cassandra
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_started
      cassandra:
        condition: service_healthy
    command: npm run start:dev

  db:
    container_name: webster-postgres
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - ${DB_PORT}:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cassandra:
    container_name: webster-cassandra
    image: cassandra:5
    restart: unless-stopped
    ports:
      - "${CASSANDRA_PORT:-9042}:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: webster
      CASSANDRA_DC: dc1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  docs-swagger:
    container_name: webster-docs
    image: swaggerapi/swagger-ui
    environment:
      - SWAGGER_JSON=/docs/api-bundled.yaml
    volumes:
      - ./docs:/docs:ro
    ports:
      - "${DOCS_PORT}:8080"

volumes:
  postgres_data:
  cassandra_data: